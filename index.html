<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- iOS Safari colors its status bar/toolbar chrome from this (defaults to
     white when absent) — without it, the status bar area sits as a stark
     white bar over the warm gradient background. Kept in sync with
     body.recording-active in main.js since the page background itself
     switches to black during pre-roll/recording. -->
<meta name="theme-color" content="#fae6dc">
<title>Wedding VDO Guest Book</title>
<style>
  /* Self-hosted rather than linked from Google Fonts: guests join over
     venue Wi-Fi (already a known flaky point — see TESTED-LEARNINGS.md),
     and some networks/in-app browsers block Google's font CDN outright.
     Serving the file from the same origin means the Thai typography
     never silently falls back to whatever system font the phone has —
     it works offline-from-Google on every device and browser. Files are
     the exact subsets Google Fonts serves for this family; weight 400/700
     share one variable-font file per subset, hence the weight RANGE. */
  @font-face {
    font-family: 'Noto Sans Thai';
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    src: url('/fonts/noto-sans-thai-thai.woff2') format('woff2');
    unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;
  }
  @font-face {
    font-family: 'Noto Sans Thai';
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    src: url('/fonts/noto-sans-thai-latin-ext.woff2') format('woff2');
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'Noto Sans Thai';
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    src: url('/fonts/noto-sans-thai-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  :root {
    /* warm cream/peach look from Bird's Figma redesign — one place to
       tweak the palette rather than repeating hex values per element.
       Top-to-bottom linear gradient per Figma node 1:3's
       bg-gradient-to-b (from-[#fae6dc] to-white). */
    --warm-gradient: linear-gradient(to bottom, #fae6dc 0%, #ffffff 100%);
    /* solid backing colour for the gradient surfaces — iOS paints its
       status-bar/toolbar chrome from this, not from the gradient image.
       Same #fae6dc as the gradient's own top stop, so the chrome and the
       content meet with no seam. Keep the theme-color meta and main.js's
       idle theme-color literal in sync with this. */
    --warm-solid: #fae6dc;
    --accent-peach: #f8ad7c;
    --accent-peach-border: #c1bf89;
    --accent-brown: #743f17;
    --ghost-bg: #ffdbc4;
    --ghost-border: #f0ae84;
    --ghost-text: #ca8133;
    --canvas-placeholder: #1c1c29;
  }

  /* 100dvh, not 100%: with viewport-fit=cover the initial containing block
     runs behind Safari's toolbar, so a 100%-tall body anchors bottom:24px
     UNDERNEATH it and the controls vanish. dvh tracks the visible viewport
     instead. main.js sizes the preview box off this same box's clientHeight.
     vh first as the fallback for older iOS. */
  html, body {
    margin: 0; height: 100vh; height: 100dvh;
    /* the color here (not just the gradient) matters: Safari 26 stopped
       reading theme-color entirely and now tints its own UI (status bar,
       toolbar) from html/body's actual background-color — a gradient only
       sets background-image, leaving background-color transparent, which
       is why the status bar was still white after the theme-color fix */
    background: var(--warm-solid) var(--warm-gradient); overflow: hidden;
    font-family: 'Noto Sans Thai', sans-serif;
  }

  /* browsers give form controls their own UI-chrome font by default
     instead of inheriting from the page — without this, every button and
     input silently falls back to the system font regardless of the
     font-family set above */
  button, input, select, textarea { font-family: inherit; }

  /* during pre-roll + recording the screen goes solid black (matches
     Figma states 3/4) — idle/entry/result stay on the warm gradient */
  body.recording-active { background: #000; }

  /* video stays hidden — we show the PROCESSED canvas instead (same
     approach as beauty-filter-camera.html) */
  #video { display: none; }

  /* ratio-locked preview box; its pixel size AND on-screen position are
     set per-frame in JS (loop()) — top depends on #gestureHint's real
     rendered height (see loop()'s topReserve), since the hint now sits
     above the box rather than overlaid inside it. */
  #outCanvas {
    position: absolute; box-sizing: border-box; /* border drawn inside the
      JS-computed size */
    transform: scaleX(-1); /* selfie mirror */
    border-radius: 12px; border: 1px solid #ddddbe;
    background: var(--canvas-placeholder); /* brief flash before first frame */
  }

  /* Sits above #outCanvas (not overlaid inside it) — per Bird's Figma
     update, moved out of the dark-canvas-overlay treatment entirely: brown
     text on the page's own warm background instead of white-on-video.
     top matches #status's exact formula (same value, safe-area included)
     so the text lands in the identical spot whether the guest is looking
     at the idle hint or the recording countdown — outCanvas goes back to
     a fixed topPad in loop() (matching pre-roll/recording) now that the
     hint no longer needs to push it down. */
  /* gestureHintText (gesture.js) embeds a literal \n at the intended line
     break for some gestures (e.g. point-up) — plain text nodes ignore that
     and only wrap by width, so the browser was picking its own break
     point instead of the one Bird specified. pre-line honors \n as a real
     break while still wrapping normally if a line runs long. */
  #gestureHint {
    position: absolute; z-index: 4; display: none; left: 50%; transform: translateX(-50%);
    top: calc(16px + env(safe-area-inset-top, 0px));
    width: 100%; max-width: 400px; padding: 0 28px; box-sizing: border-box;
    color: var(--accent-brown); font-size: 16px; line-height: 1.5; text-align: center;
    white-space: pre-line;
  }

  /* All offsets below are pulled from the Figma frame's real metadata
     (375x812 reference), not eyeballed — see get_metadata on node 1:3. */
  #entry {
    position: absolute; z-index: 10; inset: 0; background: var(--warm-solid) var(--warm-gradient);
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; gap: 40px; color: var(--accent-brown); text-align: center;
    /* top raised from Figma's exact 40px to 60px so it lines up with the
       camera preview box's top on the idle/recording screens (topPad in
       main.js's previewBox call) — consistent top across every screen */
    padding: 60px 28px 40px; box-sizing: border-box; overflow-y: auto;
  }
  #entryHero {
    width: 100%; max-width: 400px; aspect-ratio: 319 / 235; object-fit: cover;
    border-radius: 12px; flex-shrink: 0;
  }
  /* heading + input as one group (mirrors Figma's own "Container" grouping)
     so the 40px image gap and 20px heading-to-input gap can differ */
  #entryFields {
    display: flex; flex-direction: column; align-items: center;
    gap: 20px; width: 100%; max-width: 400px;
  }
  #entry h1 {
    margin: 0; font-size: 28px; font-weight: 700; line-height: 1.5;
  }
  #nameInput {
    padding: 8px 20px; font-size: 20px; border-radius: 12px;
    border: 1px solid #ddddbe; background: #fff; color: var(--accent-brown);
    width: 100%; text-align: center; box-sizing: border-box;
  }
  #nameInput::placeholder { color: #aaa; }
  #nameInput:focus::placeholder { color: transparent; }

  /* pinned to the bottom rather than flowing with hero/heading/input —
     matches the reference design's large gap before the button, and the
     same bottom-anchored pattern already used by #privacyNote/#controls */
  #startBtn {
    /* position:absolute blockifies inline-flex to flex, which broke the
       pill's shrink-to-fit sizing (it stretched wide and wrapped the
       text) — width:max-content restores hug-content sizing */
    position: absolute; z-index: 11; left: 50%; transform: translateX(-50%);
    bottom: calc(24px + env(safe-area-inset-bottom, 0px)); /* matches #controls/#resultActions on every other screen */
    width: max-content; white-space: nowrap;
  }

  #privacyNote {
    /* 24 (startBtn's own offset) + ~56 (its real rendered height — taller
       than Figma's estimate, see TESTED-LEARNINGS.md, from Thai tone-mark
       line-height) + 16px clear gap, rounded up for safety margin */
    position: absolute; z-index: 11; bottom: calc(100px + env(safe-area-inset-bottom, 0px));
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
    color: rgba(82,68,59,.6); font-size: 12px; letter-spacing: .5px;
  }
  #privacyNote img { width: 10px; height: 10px; flex-shrink: 0; }

  /* shared pill button look — every primary action (start/record/stop/
     save-or-download) uses the same peach fill; retry gets the ghost
     variant. One place to change the accent instead of six. */
  .pill {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 12px 32px; font-size: 20px; border-radius: 30px;
    border: 1px solid; text-decoration: none; text-align: center; cursor: pointer;
  }
  .pillPrimary { background: var(--accent-peach); border-color: var(--accent-peach-border); color: var(--accent-brown); }
  .pillGhost { background: var(--ghost-bg); border-color: var(--ghost-border); color: var(--ghost-text); }
  #startBtn:disabled { opacity: .5; cursor: not-allowed; }
  #stopBtn:disabled { opacity: .5; cursor: default; }

  #webviewNotice {
    position: absolute; z-index: 30; inset: 0; background: #000;
    display: none; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; color: #fff; text-align: center;
    padding: 0 28px; font-size: 17px; line-height: 1.6;
  }

  #preRoll {
    position: absolute; z-index: 15; inset: 0;
    display: none; align-items: center; justify-content: center;
    color: #fff; font-size: 120px; font-weight: bold;
    text-shadow: 0 2px 16px rgba(0,0,0,.7); pointer-events: none;
  }

  #status.warning { color: #ff5252; font-weight: bold; }

  #status {
    position: absolute; z-index: 5; top: calc(16px + env(safe-area-inset-top, 0px)); width: 100%;
    text-align: center; color: rgba(255,255,255,.85); font-size: 14px;
    text-shadow: 0 1px 3px #000; padding: 0 12px; box-sizing: border-box;
  }

  #controls {
    position: absolute; z-index: 5; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); left: 50%;
    transform: translateX(-50%);
    display: none; gap: 16px;
  }
  #stopBtn { display: none; }

  #result {
    position: absolute; z-index: 20; inset: 0; background: var(--warm-solid) var(--warm-gradient);
    display: none; flex-direction: column; align-items: center;
    /* top-anchored (was centred) to match the same 60px top as every
       other screen — centring let the message+video pair float wherever
       their combined height happened to land */
    justify-content: flex-start; gap: 16px; padding: 60px 24px 24px; box-sizing: border-box;
  }
  #result video {
    max-width: 92vw; max-height: 65vh; box-sizing: border-box;
    border-radius: 12px; border: 1px solid #ddddbe;
  }
  #uploadStatus { color: var(--accent-brown); font-size: 20px; text-align: center; }
  /* pinned to the bottom like every other screen's button(s), rather than
     flowing inside #result's centred column — pulling it out of flow this
     way needs its own centring/width since it no longer inherits #result's */
  #resultActions {
    position: absolute; z-index: 21; left: 50%; transform: translateX(-50%);
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    display: flex; gap: 16px; width: calc(100% - 48px); max-width: 375px;
  }
  #resultActions .pill { flex: 1; }
  #downloadLink { display: none; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<!-- text is set from the staff-selected gesture in main.js (gestureHintText) -->
<div id="gestureHint"></div>
<canvas id="outCanvas"></canvas>

<div id="entry">
  <img id="entryHero" src="/entry-hero.png" alt="I and B, 25 07 2026">
  <div id="entryFields">
    <h1>✨ มาอัดคลิปอวยพร ✨<br>ให้บ่าวสาวกัน</h1>
    <input id="nameInput" type="text" lang="th" enterkeyhint="go" placeholder="กรอกชื่อที่บ่าวสาวอ่านแล้ว อ๋อออ" maxlength="60" required>
  </div>
  <button id="startBtn" class="pill pillPrimary" disabled>Loading AI models…</button>
  <div id="privacyNote">
    <img src="/lock-icon.svg" alt="">
    <span>ระบบจะขออนุญาตเปิดกล้อง ข้อมูลของคุณจะเป็นความลับ</span>
  </div>
</div>

<div id="webviewNotice">
  <p>📱 กรุณาเปิดในเบราว์เซอร์</p>
  <p>แตะเมนู ⋯ หรือ ↗ มุมขวาบน<br>แล้วเลือก "เปิดในเบราว์เซอร์" / "Open in Browser"</p>
  <p>Please open this page in your browser.<br>
  Tap the ⋯ or ↗ menu and choose "Open in Browser".</p>
</div>

<div id="preRoll"></div>
<div id="status"></div>

<div id="controls">
  <button id="recordBtn" class="pill pillPrimary">กดเพื่อเริ่มอัด</button>
  <button id="stopBtn" class="pill pillPrimary">■ หยุด</button>
</div>

<div id="result">
  <div id="uploadStatus"></div>
  <video id="previewVideo" playsinline muted loop></video>
  <div id="resultActions">
    <button id="retryBtn" class="pill pillGhost">อัดอีกรอบ</button>
    <button id="saveBtn" class="pill pillPrimary" style="display:none">โหลดคลิป</button>
    <a id="downloadLink" class="pill pillPrimary" download target="_blank" rel="noopener">โหลดคลิป</a>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
