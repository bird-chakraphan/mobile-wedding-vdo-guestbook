<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding VDO Guest Book — Staff</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }

  label { display: block; margin-bottom: 16px; font-size: 14px; }
  label span { display: block; margin-bottom: 6px; color: #aaa; }
  input[type=text], input[type=password], input[type=number], select {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff;
  }
  input[type=range] { width: 100%; accent-color: #e84393; }
  input[type=file] { width: 100%; font-size: 13px; color: #ccc; }
  button {
    padding: 12px 24px; font-size: 15px; border-radius: 10px; border: none;
    background: #e84393; color: #fff; cursor: pointer; width: 100%;
  }

  /* passcode gate — shown first, centred */
  #passcodeGate {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  #passcodeGate .box { width: 100%; max-width: 320px; }
  #passcodeGate h1 { font-size: 20px; margin: 0 0 24px; }

  /* workspace — preview column (left) + settings column (right) */
  #workspace { display: none; height: 100vh; }
  #previewColumn {
    flex: 1; min-width: 0; position: relative; overflow: hidden; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  #previewVideo { display: none; }
  #previewCanvas {
    display: block; box-sizing: border-box; /* border drawn inside the
      JS-set canvas.width/height, matching the guest page's #outCanvas */
    border-radius: 4px; border: 1px solid #ddddbe;
    transform: scaleX(-1); /* selfie mirror, matches guest page */
  }
  #viewToggle {
    position: absolute; top: 16px; right: 16px; width: auto;
    padding: 8px 16px; font-size: 13px; background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.25); backdrop-filter: blur(8px);
  }
  /* gesture-detection status (hands seen / gesture detected) — same info
     the guest page used to show; guests no longer see it, but it's useful
     for staff to confirm the model is picking up hands while tuning.
     Shown only in the "Show detection" view (see staff.js). */
  #previewStatus {
    position: absolute; z-index: 5; top: 16px; left: 16px;
    max-width: calc(100% - 120px); display: none;
    color: rgba(255,255,255,.85); font-size: 13px;
    text-shadow: 0 1px 3px #000;
  }
  #settingsColumn {
    width: 440px; max-width: 100%; height: 100vh; overflow-y: auto;
    padding: 24px; background: #111;
  }
  #settingsColumn h1 { font-size: 20px; margin: 0 0 24px; }
  #status { margin-top: 14px; font-size: 14px; min-height: 20px; }

  /* current-upload preview + remove, shown under each asset field */
  .assetCurrent {
    display: none; align-items: center; gap: 10px; margin: -8px 0 16px;
  }
  .assetThumb {
    height: 48px; width: 48px; object-fit: contain;
    border-radius: 4px; background: #000; border: 1px solid #333;
  }
  .assetRemove {
    width: auto; padding: 6px 12px; font-size: 13px; background: #444;
  }

  /* stack on narrow screens: preview pinned to top, settings scroll below */
  @media (max-width: 820px) {
    body { overflow: auto; }
    #workspace { flex-direction: column; height: auto; }
    #previewColumn { height: 45vh; position: sticky; top: 0; z-index: 5; }
    #settingsColumn { width: 100%; height: auto; overflow: visible; }
  }
</style>
</head>
<body>

<div id="passcodeGate">
  <div class="box">
    <h1>Staff settings</h1>
    <label><span>Passcode</span>
      <input id="passcodeInput" type="password" autocomplete="off">
    </label>
    <button id="unlockBtn">Enter</button>
  </div>
</div>

<div id="workspace">
  <div id="previewColumn">
    <button id="viewToggle">Show detection</button>
    <div id="previewStatus"></div>
    <video id="previewVideo" autoplay playsinline muted></video>
    <canvas id="previewCanvas"></canvas>
  </div>

  <div id="settingsColumn">
    <h1>Staff settings</h1>
    <form id="settingsForm">
      <label><span>Recording time limit (seconds)</span>
        <input id="timeLimitInput" type="number" min="10" max="300">
      </label>
      <label><span>Skin smoothing: <span id="smoothVal"></span></span>
        <input id="smoothInput" type="range" min="0" max="100">
      </label>
      <label><span>Glow: <span id="glowVal"></span></span>
        <input id="glowInput" type="range" min="0" max="100">
      </label>
      <label><span>V-shape face: <span id="vshapeVal"></span></span>
        <input id="vshapeInput" type="range" min="0" max="100">
      </label>
      <label><span>Narrow face: <span id="narrowVal"></span></span>
        <input id="narrowInput" type="range" min="0" max="100">
      </label>
      <label><span>Output size</span>
        <select id="presetSelect"></select>
      </label>
      <label><span>Gesture (pops the graphic)</span>
        <select id="gestureTypeSelect"></select>
      </label>
      <label><span>Graphic size: <span id="gestureScaleVal"></span>%</span>
        <input id="gestureScaleInput" type="range" min="25" max="200">
      </label>
      <label><span>Frame overlay (optional, transparent PNG)</span>
        <input id="frameFileInput" type="file" accept="image/*">
      </label>
      <div class="assetCurrent" id="frameCurrent">
        <img class="assetThumb" id="framePreview" alt="Current frame overlay">
        <button type="button" class="assetRemove" id="frameRemoveBtn">Remove</button>
      </div>
      <label><span>Left-hand gesture graphic (optional)</span>
        <input id="gestureLeftFileInput" type="file" accept="image/*">
      </label>
      <div class="assetCurrent" id="gestureLeftCurrent">
        <img class="assetThumb" id="gestureLeftPreview" alt="Current left-hand graphic">
        <button type="button" class="assetRemove" id="gestureLeftRemoveBtn">Remove</button>
      </div>
      <label><span>Right-hand gesture graphic (optional)</span>
        <input id="gestureRightFileInput" type="file" accept="image/*">
      </label>
      <div class="assetCurrent" id="gestureRightCurrent">
        <img class="assetThumb" id="gestureRightPreview" alt="Current right-hand graphic">
        <button type="button" class="assetRemove" id="gestureRightRemoveBtn">Remove</button>
      </div>
      <button id="saveBtn" type="submit">Save</button>
    </form>
    <div id="status"></div>
  </div>
</div>

<script type="module" src="/src/staff.js"></script>
</body>
</html>
