<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Particle Swarm — Learning Demo</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }

  /* The video and canvas are stacked on top of each other */
  #video, #fxCanvas {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
    transform: scaleX(-1); /* mirror, like a selfie camera */
  }
  #fxCanvas { z-index: 2; } /* canvas sits ON TOP of the video */

  #startBtn {
    position: absolute; z-index: 10;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    padding: 16px 32px; font-size: 18px; border-radius: 30px;
    border: none; background: #7c5cff; color: #fff; cursor: pointer;
  }
  #hint {
    position: absolute; z-index: 5; bottom: 20px; width: 100%;
    text-align: center; color: rgba(255,255,255,.7); font-size: 14px;
  }
</style>
</head>
<body>

<!-- BLOCK 1: the live webcam feed -->
<video id="video" autoplay playsinline muted></video>

<!-- BLOCK 3: the effect layer drawn over the video -->
<canvas id="fxCanvas"></canvas>

<button id="startBtn">Start camera ✨</button>
<div id="hint">Move your hands — the fish will scatter!</div>

<script>
/* ============================================================
   HOW THIS WORKS — the 3 building blocks:

   1. WEBCAM: getUserMedia() streams the camera into <video>.
   2. MOTION DETECTION: every frame we draw the video (tiny,
      e.g. 64x48 pixels) onto a hidden canvas and compare it
      with the previous frame. Pixels that changed = movement.
   3. PARTICLES: ~120 "fish" swim around. Each frame they check
      "is there motion near me?" — if yes, they flee from it.
   ============================================================ */

const video   = document.getElementById('video');
const canvas  = document.getElementById('fxCanvas');
const ctx     = canvas.getContext('2d');
const btn     = document.getElementById('startBtn');

// Hidden tiny canvas used only for motion detection.
// Small = fast. We don't need HD to know "where movement is".
const GRID_W = 64, GRID_H = 48;
const motionCanvas = document.createElement('canvas');
motionCanvas.width = GRID_W; motionCanvas.height = GRID_H;
const mctx = motionCanvas.getContext('2d', { willReadFrequently: true });

let prevFrame = null;          // previous frame's pixels
let motionPoints = [];         // where movement happened this frame

/* ---------- BLOCK 1: start the webcam ---------- */
btn.addEventListener('click', async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  btn.remove();
  resize();
  makeParticles();
  requestAnimationFrame(loop);   // start the animation loop
});

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

/* ---------- BLOCK 2: motion detection ---------- */
function detectMotion() {
  // draw current video frame tiny
  mctx.drawImage(video, 0, 0, GRID_W, GRID_H);
  const frame = mctx.getImageData(0, 0, GRID_W, GRID_H);

  motionPoints = [];
  if (prevFrame) {
    // compare every pixel with the previous frame
    for (let i = 0; i < frame.data.length; i += 4) {
      const diff =
        Math.abs(frame.data[i]   - prevFrame.data[i]) +      // red
        Math.abs(frame.data[i+1] - prevFrame.data[i+1]) +    // green
        Math.abs(frame.data[i+2] - prevFrame.data[i+2]);     // blue

      if (diff > 90) { // threshold: big change = movement
        const px = (i / 4) % GRID_W;
        const py = Math.floor((i / 4) / GRID_W);
        // convert tiny-grid position → full screen position
        motionPoints.push({
          x: (px / GRID_W) * canvas.width,
          y: (py / GRID_H) * canvas.height
        });
      }
    }
  }
  prevFrame = frame;
}

/* ---------- BLOCK 3: the particle "fish" ---------- */
const COLORS = ['#ff5c8a','#ffd85c','#5cffb0','#5cc8ff','#c95cff','#ff8f5c'];
let particles = [];

function makeParticles() {
  particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - .5) * 2,     // velocity x
      vy: (Math.random() - .5) * 2,     // velocity y
      size: 6 + Math.random() * 10,
      color: COLORS[i % COLORS.length],
      wiggle: Math.random() * Math.PI * 2  // for the swimming motion
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    // 1) gentle swimming wiggle
    p.wiggle += 0.1;
    p.vx += Math.cos(p.wiggle) * 0.05;
    p.vy += Math.sin(p.wiggle * 0.7) * 0.05;

    // 2) FLEE from nearby motion (this is the "interaction"!)
    for (const m of motionPoints) {
      const dx = p.x - m.x, dy = p.y - m.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 150 && dist > 1) {
        const force = (150 - dist) / 150 * 1.2; // closer = stronger push
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
    }

    // 3) friction so they slow down again
    p.vx *= 0.96; p.vy *= 0.96;

    // 4) move, and wrap around screen edges
    p.x += p.vx; p.y += p.vy;
    if (p.x < -20) p.x = canvas.width + 20;
    if (p.x > canvas.width + 20) p.x = -20;
    if (p.y < -20) p.y = canvas.height + 20;
    if (p.y > canvas.height + 20) p.y = -20;
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    const angle = Math.atan2(p.vy, p.vx); // face swimming direction
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(angle);

    // glowing body
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size, p.size * .55, 0, 0, Math.PI * 2);
    ctx.fill();

    // tail
    ctx.beginPath();
    ctx.moveTo(-p.size, 0);
    ctx.lineTo(-p.size - 8, -5);
    ctx.lineTo(-p.size - 8, 5);
    ctx.fill();

    ctx.restore();
  }
}

/* ---------- the animation loop: runs ~60x per second ---------- */
function loop() {
  detectMotion();      // block 2
  updateParticles();   // physics
  drawParticles();     // block 3
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
